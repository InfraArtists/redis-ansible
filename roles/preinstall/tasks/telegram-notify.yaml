# tasks file for telegram-notify

- name: Copy telegram-send
  copy:
    src: telegram-send
    dest: /usr/bin/telegram-send
    owner: root
    group: root
    mode: "0755"

- name: Copy login-notify
  copy:
    src: login-notify.sh
    dest: /etc/profile.d/login-notify.sh
    owner: root
    group: root
    mode: "0755"