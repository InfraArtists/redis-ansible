- name: Deploy disable-thp systemd unit
  copy:
    src: disable-thp.service
    dest: /etc/systemd/system/disable-thp.service
    owner: root
    group: root
    mode: "0644"
  when: disable_transparent_huge_pages == "true"

- name: Enable and start disable-thp service
  systemd:
    name: disable-thp
    enabled: true
    state: started
    daemon_reload: true
  when: disable_transparent_huge_pages == "true"
