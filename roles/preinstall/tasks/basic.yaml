- name: Set timezone to UTC
  timezone:
    name: Etc/UTC

- name: Write /etc/hostname
  copy:
    content: "{{ inventory_hostname }}\n"
    dest: /etc/hostname

- name: Apply hostname to running kernel
  command: hostname {{ inventory_hostname }}
  changed_when: false

- name: Remove symlink resolve.conf | Comment this task if you live in outside of Iran :)
  file:
    path: "/etc/resolv.conf"
    state: absent
  when: use_iran == "true"
  ignore_errors: true

- name: Configure resolv.conf | Comment this task if you live in outside of Iran :)
  template:
    src: "resolv.conf.j2"
    dest: "/etc/resolv.conf"
    mode: "0644"
  when: use_iran == "true"

- name: Set 127.0.0.1 hosts entry
  lineinfile:
    path: /etc/hosts
    regexp: '^127\.0\.0\.1'
    line: "127.0.0.1 {{ inventory_hostname }} localhost"
    owner: root
    group: root
    mode: 0644

- name: Set 127.0.1.1 hosts entry
  lineinfile:
    path: /etc/hosts
    regexp: '^127\.0\.1\.1'
    line: "127.0.0.1 {{ inventory_hostname }} localhost"
    owner: root
    group: root
    mode: 0644

- name: Add hosts to /etc/hosts
  lineinfile:
    path: /etc/hosts
    line: "{{ hostvars[item].private_ip }} {{ item }} {{ item }}.{{ domain }}"
    state: present
    create: no
  loop: "{{ groups['all'] }}"
  when: hostvars[item].private_ip is defined

