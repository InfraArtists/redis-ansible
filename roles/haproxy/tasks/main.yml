---
# tasks file for haproxy
- name: Install haproxy
  apt:
    name: haproxy
    state: present
    update_cache: yes

- name: Deploy haproxy config
  template:
    src: haproxy.cfg.j2
    dest: /etc/haproxy/haproxy.cfg
    owner: root
    group: root
    mode: "0644"
  notify: Reload haproxy

- name: Ensure haproxy is started and enabled
  service:
    name: haproxy
    state: started
    enabled: true

