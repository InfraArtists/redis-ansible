- name: Capture master private IP
  set_fact:
    master_ip: "{{ hostvars[item].private_ip }}"
  when: "'role' in hostvars[item] and hostvars[item].role == 'master'"
  loop: "{{ groups['redis'] }}"

- name: Check if sentinel.conf already exists
  stat:
    path: /etc/redis/sentinel.conf
  register: sentinel_conf_stat

- name: Deploy sentinel.conf (initial deploy only — sentinel rewrites this after failover)
  template:
    src: sentinel.conf.j2
    dest: /etc/redis/sentinel.conf
    owner: redis
    group: redis
    mode: "0640"
  when: not sentinel_conf_stat.stat.exists or (force_sentinel_config | default(false) | bool)
  notify: Restart redis-sentinel

- name: Deploy sentinel systemd unit
  template:
    src: sentinel.service.j2
    dest: /etc/systemd/system/redis-sentinel.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - Reload systemd
    - Restart redis-sentinel

- name: Reload systemd daemon
  systemd:
    daemon_reload: true

- name: Ensure redis-sentinel is started and enabled
  service:
    name: redis-sentinel
    state: started
    enabled: true

