- name: Capture master private IP
  set_fact:
    master_ip: "{{ hostvars[item].private_ip }}"
  when: "'role' in hostvars[item] and hostvars[item].role == 'master'"
  loop: "{{ groups['redis'] }}"

- name: Check if sentinel.conf was deployed by Ansible (vs package default)
  command: grep -q "ansible_managed" /etc/redis/sentinel.conf
  register: sentinel_conf_managed
  changed_when: false
  failed_when: false

- name: Deploy sentinel.conf
  template:
    src: sentinel.conf.j2
    dest: /etc/redis/sentinel.conf
    owner: redis
    group: redis
    mode: "0640"
  when: sentinel_conf_managed.rc != 0 or (force_sentinel_config | default(false) | bool)
  notify: Restart redis-sentinel

- name: Deploy sentinel systemd unit
  template:
    src: sentinel.service.j2
    dest: /etc/systemd/system/redis-sentinel.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - Reload systemd
    - Restart redis-sentinel

- name: Reload systemd daemon
  systemd:
    daemon_reload: true

- name: Ensure redis-sentinel is started and enabled
  service:
    name: redis-sentinel
    state: started
    enabled: true

